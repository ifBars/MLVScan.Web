name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone MLVScan.Core
        run: git clone --depth 1 https://github.com/ifBars/MLVScan.Core ../MLVScan.Core

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run tsc --noEmit

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Restore Core tools and packages
        run: |
          dotnet tool restore
          dotnet restore ../MLVScan.Core/MLVScan.Core.csproj

      - name: Verify Core version drift guard
        run: dotnet test ../MLVScan.Core/MLVScan.Core.Tests/MLVScan.Core.Tests.csproj --filter "FullyQualifiedName~MLVScanVersionsTests.CoreVersion_MatchesDirectoryBuildPropsVersion"

      - name: Build Core
        run: dotnet build ../MLVScan.Core/MLVScan.Core.csproj -c Release --no-restore

      - name: Generate reference docs
        run: bun run docs:generate

      - name: Build
        run: bun run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            pages deploy dist
            --project-name=mlvscan-web
            --branch=${{ github.head_ref || github.ref_name }}
            --commit-hash=${{ github.sha }}
