<!doctype html>
<html lang="en">
  <head>
    <base href="/" />
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--app-seo-start-->
    <title>MLVScan</title>
    <meta
      name="description"
      content="MLVScan is a Unity mod antivirus and malware scanner for MelonLoader and BepInEx mods."
    />
    <!--app-seo-end-->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!--app-seo-body-start-->
    <noscript>
      <main style="margin:0 auto;max-width:72rem;padding:3rem 1.5rem;font-family:Inter,Arial,sans-serif;line-height:1.65;color:#e5e7eb;background:#020617;">
        <h1 style="margin:0 0 1rem;font-size:2rem;line-height:1.15;color:#f8fafc;">MLVScan</h1>
        <p>MLVScan is a Unity mod antivirus and malware scanner for MelonLoader and BepInEx mods.</p>
      </main>
    </noscript>
    <!--app-seo-body-end-->
    <div id="root"></div>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
