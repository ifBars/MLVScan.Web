<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow">
  <title>MLVScan Route Redirect | Unity Mod Antivirus</title>
  <script type="text/javascript">
    // Single Page Apps for GitHub Pages
    // MIT License
    // https://github.com/rafgraph/spa-github-pages
    
    var pathSegmentsToKeep = 0;

    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
  <main style="margin:0 auto;max-width:48rem;padding:3rem 1.5rem;font-family:Inter,Arial,sans-serif;line-height:1.65;color:#e5e7eb;background:#020617;">
    <h1 style="margin:0 0 1rem;font-size:2rem;line-height:1.15;color:#f8fafc;">MLVScan route redirect</h1>
    <p>This page forwards deep links back into the MLVScan app so scanner, docs, advisory, and threat-family routes still resolve correctly.</p>
    <p>If you are not redirected automatically, return to the <a href="/" style="color:#67e8f9;">MLVScan homepage</a>.</p>
  </main>
</body>
</html>
